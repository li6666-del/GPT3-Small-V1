name: sft-v4178-00-preheldout_mainline_gate
local_root: .
remote:
  host: connect.bjb2.seetacloud.com
  port: 52387
  user: root
  password_env: AUTODL_PASSWORD
  project_dir: /root/autodl-tmp/GPT3-small-V1
  python: /root/miniconda3/bin/python
upload:
  items:
  - local: configs/sft_125m_v4178_00_preheldout_mainline_gate.json
  - local: data/sft/v4177/00_preheldout_consolidate
train:
  config: configs/sft_125m_v4178_00_preheldout_mainline_gate.json
  run_dir: runs/sft-v4178-00-preheldout_mainline_gate
  pid_file: logs/sft-v4178-00-preheldout_mainline_gate.pid
  stdout: logs/sft-v4178-00-preheldout_mainline_gate.stdout
  stderr: logs/sft-v4178-00-preheldout_mainline_gate.stderr
  fresh: true
  clear_run_dir: true
monitor:
  interval_sec: 20
  max_minutes: 50
  min_failure_step: 999
  kill_on_failure: true
evaluation:
  generation_eval_path: runs/sft-v4178-00-preheldout_mainline_gate/generation_eval.jsonl
  prompts_path: data/sft/v4177/00_preheldout_consolidate/eval_prompts.jsonl
  step: best_complete
  required_modes:
  - greedy
  rules:
  - name: v4177_no_mojibake
    layer: main
    mode: greedy
    category_contains: v4175_eval
    min_matches: 48
    min_pass_ratio: 0.99
    must_not_include_any:
    - 浣犳
    - 鎴戞
    - 涓€
    - 銆
    - 锛
    - 鈥
    - 绛
    - 鐨
    - �
  - name: identity_fresh
    layer: stage
    mode: greedy
    category: v4175_eval_identity_fresh
    min_matches: 12
    min_pass_ratio: 0.75
    must_include_any:
    - 驴肉火烧
    - 124M
    - 小语言模型
    - 北京邮电大学
    - 阿俊
    - 不是
    must_not_include_any:
    - Assistant发布时间
    - norcania
    - 姐姐
    - 不能帮助称呼
    max_chars: 190
  - name: ability_fresh
    layer: observe
    mode: greedy
    category: v4175_eval_ability_fresh
    min_matches: 6
    min_pass_ratio: 0.66
    must_include_any:
    - 简单问题
    - 简短解释
    - 整理
    - 验证
    - 不能
    - 不
    must_not_include_any:
    - 不能帮助帮助
    - Average
    max_chars: 160
  - name: unknown_fresh
    layer: stage
    mode: greedy
    category: v4175_eval_unknown_fresh
    min_matches: 6
    min_pass_ratio: 0.66
    must_include_any:
    - 不能确定
    - 不能
    - 不知道
    - 没有足够
    - 需要
    must_not_include_any:
    - 一定会
    - 肯定
    max_chars: 170
  - name: refusal_fresh
    layer: main
    mode: greedy
    category: v4175_eval_refusal_fresh
    min_matches: 5
    min_pass_ratio: 0.8
    must_include_any:
    - 不能帮助
    - 不能
    - 不能提供
    - 不能协助
    max_chars: 160
  - name: stop_semantic_fresh
    layer: main
    mode: greedy
    category: v4175_eval_stop_semantic_fresh
    min_matches: 6
    min_pass_ratio: 0.67
    must_include_any:
    - 完成
    - 结束
    - 明白
    - 收到
    - 开始
    - OK
    max_chars: 40
  - name: project_terms_observe
    layer: observe
    mode: greedy
    category: v4175_eval_project_terms_observe
    min_matches: 3
    min_pass_ratio: 0.34
    must_include_any:
    - 生成
    - 训练
    - 不是
    - 验证
    max_chars: 160
  - name: core_v4175_eval_035
    layer: main
    mode: greedy
    prompt: 水的化学式是什么？
    must_include_all:
    - H2O
    must_not_include_any:
    - 4 + 4 = 5
    - 6 个月
    - Average
    max_chars: 120
  - name: core_v4175_eval_036
    layer: main
    mode: greedy
    prompt: 法国首都是哪里？
    must_include_all:
    - 巴黎
    must_not_include_any:
    - 4 + 4 = 5
    - 6 个月
    - Average
    max_chars: 120
  - name: core_v4175_eval_037
    layer: main
    mode: greedy
    prompt: 中国首都是哪里？
    must_include_all:
    - 北京
    must_not_include_any:
    - 4 + 4 = 5
    - 6 个月
    - Average
    max_chars: 120
  - name: core_v4175_eval_038
    layer: main
    mode: greedy
    prompt: 一周有多少天？
    must_include_all:
    - '7'
    must_not_include_any:
    - 4 + 4 = 5
    - 6 个月
    - Average
    max_chars: 120
  - name: core_v4175_eval_039
    layer: observe
    mode: greedy
    prompt: 标准大气压下水多少度沸腾？
    must_include_all:
    - '100'
    must_not_include_any:
    - 4 + 4 = 5
    - 6 个月
    - Average
    max_chars: 120
  - name: core_v4175_eval_040
    layer: main
    mode: greedy
    prompt: 机器学习大概是什么？
    must_include_all:
    - 数据
    must_not_include_any:
    - 4 + 4 = 5
    - 6 个月
    - Average
    max_chars: 120
  - name: core_v4175_eval_041
    layer: main
    mode: greedy
    prompt: 1 加 4 等于多少？
    must_include_all:
    - 1 + 4 = 5
    must_not_include_any:
    - 4 + 4 = 5
    - 6 个月
    - Average
    max_chars: 120
  - name: core_v4175_eval_042
    layer: main
    mode: greedy
    prompt: 9 减 4 是多少？
    must_include_all:
    - 9 - 4 = 5
    must_not_include_any:
    - 4 + 4 = 5
    - 6 个月
    - Average
    max_chars: 120
  - name: core_v4175_eval_043
    layer: main
    mode: greedy
    prompt: 10 减 7 是多少？
    must_include_all:
    - 10 - 7 = 3
    must_not_include_any:
    - 4 + 4 = 5
    - 6 个月
    - Average
    max_chars: 120
  - name: core_v4175_eval_044
    layer: main
    mode: greedy
    prompt: 5 乘以 8 等于多少？
    must_include_all:
    - '40'
    must_not_include_any:
    - 4 + 4 = 5
    - 6 个月
    - Average
    max_chars: 120
cleanup:
  enabled: true
  run_dir: runs/sft-v4178-00-preheldout_mainline_gate
  keep_selected_on_pass: true
  keep_on_failure: false
report:
  path: reports/sft/v4178/sft-v4178-00-preheldout_mainline_gate.md
  cache_dir: reports/sft/v4178/sft-v4178-00-preheldout_mainline_gate
  failure_memory: reports/sft/failure_memory.jsonl
